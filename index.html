<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Branddi · Auditoria + NE</title>
<style>
:root{
  --brand:#1abcac; --brand-dark:#159c8e; --brand-soft:#e6f8f6;
  --surface:#ffffff; --surface2:#f7f9fa; --surface3:#eef2f4;
  --text:#0f1a1d; --text2:#4a5a60; --text3:#8a9aa0;
  --border:#d8e0e3; --border2:#e8edef;
  --radius:10px;
  --green:#1abc7a; --red:#e35d5d; --amber:#f0a02d;
  --font:'Inter','Segoe UI',system-ui,Arial,sans-serif;
  --mono:'JetBrains Mono','Fira Code',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.4}
button{font-family:inherit;cursor:pointer}
select,input,textarea{font-family:inherit;font-size:12.5px}

/* Header */
.topbar{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:8px 16px}
.brand{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--text)}
.brand .logo{width:26px;height:26px;border-radius:7px;background:var(--brand);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px}
.brand .sep{color:var(--text3);font-weight:500;margin:0 4px}
.brand .sub{color:var(--text2);font-weight:500}
.brand .dept{margin-left:14px;padding:2px 10px;border-radius:999px;background:var(--surface3);color:var(--text2);font-weight:600;font-size:11.5px;letter-spacing:.01em}
.status-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:var(--surface3);color:var(--text2);font-size:11.5px;font-weight:500}
.status-chip.ok{background:#e6f8ef;color:#0c7a4a}
.status-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.topbar .spacer{flex:1}
.btn{border:1px solid var(--border);background:var(--surface);color:var(--text);padding:6px 11px;border-radius:8px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface3)}
.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn.primary:hover{background:var(--brand-dark)}
.btn.danger{color:var(--red);border-color:#f0c8c8}
.btn.ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn.ghost:hover{background:var(--surface3)}
.btn.sm{padding:4px 8px;font-size:11.5px}
.last-sync{font-size:11px;color:var(--text3);font-family:var(--mono)}

/* Tabs */
.section-tabs{display:flex;gap:2px;padding:8px 16px 0;background:var(--surface);border-bottom:1px solid var(--border)}
.section-tabs button{background:transparent;border:none;border-bottom:2px solid transparent;padding:8px 14px;color:var(--text2);font-weight:600;font-size:13px;border-radius:6px 6px 0 0}
.section-tabs button.active{color:var(--brand);border-bottom-color:var(--brand);background:var(--brand-soft)}
.section-tabs .count{background:var(--surface3);color:var(--text2);border-radius:999px;padding:1px 7px;font-size:11px;margin-left:6px;font-weight:700}
.section-tabs button.active .count{background:var(--brand);color:#fff}

.carteira-tabs{display:flex;flex-wrap:wrap;gap:4px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border2)}
.carteira-tabs button{background:var(--surface3);border:1px solid transparent;padding:4px 10px;border-radius:999px;color:var(--text2);font-size:11.5px;font-weight:600}
.carteira-tabs button.active{background:var(--brand);color:#fff}
.carteira-tabs button .cnt{display:inline-block;margin-left:6px;padding:1px 7px;border-radius:999px;background:var(--brand-soft);color:var(--brand-dark);font-size:10.5px;font-weight:700;font-family:var(--mono);min-width:18px;text-align:center}
.carteira-tabs button.active .cnt{background:rgba(255,255,255,.25);color:#fff}

/* Filter bar */
.filterbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border2);flex-wrap:wrap}
.filterbar .search{position:relative;flex:1;min-width:200px;max-width:340px}
.filterbar .search .ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);pointer-events:none}
.filterbar .search input{width:100%;padding:6px 10px 6px 32px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-size:12.5px}
.filterbar .search input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-soft)}
.filterbar select{padding:6px 28px 6px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M3 5l3 3 3-3' stroke='%234a5a60' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>") no-repeat right 9px center;background-size:10px;appearance:none;-webkit-appearance:none;font-size:12.5px;color:var(--text);min-width:160px;cursor:pointer}
.filterbar .spacer{flex:1}
.filterbar .progress{display:flex;align-items:center;gap:8px}
.filterbar .progress .pct{font-family:var(--mono);font-size:11.5px;color:var(--text2);font-weight:600;min-width:30px;text-align:right}
.filterbar .progress .track{width:120px;height:6px;background:var(--surface3);border-radius:999px;overflow:hidden}
.filterbar .progress .track>div{height:100%;background:linear-gradient(90deg,var(--green),var(--brand));width:0%;transition:width .25s}
.filterbar .progress .chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px}
.filterbar .progress .chip.ok{background:#e6f8ef;color:#0c7a4a}
.filterbar .progress .chip.pend{background:#fdecec;color:var(--red)}
.filterbar .progress .chip .dot{width:7px;height:7px;border-radius:50%}
.filterbar .progress .chip.ok .dot{background:var(--green)}
.filterbar .progress .chip.pend .dot{background:var(--red)}
.subfilter{display:flex;gap:6px;padding:8px 16px;background:var(--surface2);border-bottom:1px solid var(--border2)}
.subfilter button{background:var(--surface);border:1px solid var(--border);padding:5px 11px;border-radius:7px;color:var(--text2);font-size:11.5px;font-weight:600}
.subfilter button.active{background:var(--text);color:#fff;border-color:var(--text)}

/* Banner */
.banner{padding:8px 16px;font-size:12px;color:var(--text2);background:var(--brand-soft);border-bottom:1px solid var(--brand)}
.banner.warn{background:#fff7e6;border-bottom-color:var(--amber);color:#7a4a00}
.banner.err{background:#fdecec;border-bottom-color:var(--red);color:#7a1c1c}
.banner.hidden{display:none}
.bar{display:inline-block;width:160px;height:6px;background:rgba(255,255,255,.6);border-radius:999px;margin-left:8px;vertical-align:middle;overflow:hidden}
.bar > div{height:100%;background:var(--brand);width:0%;transition:width .2s}

/* Table */
.table-wrap{padding:8px 16px 80px;overflow:auto}
table.audit{width:100%;border-collapse:separate;border-spacing:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table.audit thead th{position:sticky;top:0;background:var(--surface3);text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);padding:8px 10px;border-bottom:1px solid var(--border);user-select:none;white-space:nowrap}
table.audit thead th.sortable{cursor:pointer}
table.audit thead th.sortable:hover{background:var(--border2)}
table.audit thead th .arrow{opacity:.5;font-size:10px;margin-left:3px}
table.audit tbody td{padding:7px 10px;border-bottom:1px solid var(--border2);vertical-align:top;font-size:12.5px}
table.audit tbody tr:hover{background:var(--surface2)}
table.audit tbody tr.selected{background:var(--brand-soft)}
.cell-title a{color:var(--text);text-decoration:none;font-weight:600}
.cell-title a:hover{color:var(--brand);text-decoration:underline}
.cell-title .meta{font-size:10.5px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.cell-vencimento{font-family:var(--mono);font-size:12px;white-space:nowrap}
.cell-vencimento .dias{display:inline-block;margin-left:4px;font-size:10.5px;padding:1px 5px;border-radius:999px;background:#fdecec;color:var(--red);font-weight:700}
.cell-vencimento .dias.zero{background:#fff7e6;color:#a06b00}
.cell-vencimento .dias.ok{background:#e6f8ef;color:#0c7a4a}
.cell-fase{font-size:11.5px;color:var(--text2);background:var(--surface3);padding:2px 7px;border-radius:6px;display:inline-block}
.cell-action{position:sticky;right:0;background:var(--surface);box-shadow:-2px 0 4px rgba(0,0,0,.04)}
.cell-action th{background:var(--surface3) !important}
input[type=checkbox]{accent-color:var(--brand);cursor:pointer}
.sel-col{width:32px}
.ctrl-select{width:100%;padding:4px 6px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-size:12px}
.ctrl-select.sim{background:#e6f8ef;border-color:#9be3c0}
.ctrl-select.nao{background:#fdecec;border-color:#f0c8c8}
.ctrl-text{width:100%;min-height:28px;padding:4px 6px;border-radius:6px;border:1px solid var(--border);background:var(--surface);resize:vertical;font-size:11.5px;font-family:inherit}

/* NE badge */
.ne-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
.ne-badge.loading{background:var(--surface3);color:var(--text2)}
.ne-badge.ok{background:#e6f8ef;color:#0c7a4a}
.ne-badge.warn{background:#fff7e6;color:#a06b00}
.ne-badge.block{background:#fdecec;color:var(--red)}
.ne-badge.none{color:var(--text3)}

/* Mass-select bar */
.mass-bar{position:fixed;bottom:0;left:0;right:0;background:var(--green);color:#fff;padding:10px 16px;display:none;align-items:center;gap:12px;box-shadow:0 -3px 16px rgba(0,0,0,.1);z-index:40}
.mass-bar.active{display:flex}
.mass-bar select{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;padding:5px 8px;border-radius:6px}
.mass-bar select option{color:var(--text)}
.mass-bar .btn{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.4);color:#fff}
.mass-bar .btn:hover{background:rgba(255,255,255,.3)}
.mass-bar .count{font-weight:700}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(15,26,29,.5);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border-radius:14px;box-shadow:0 24px 80px rgba(0,0,0,.2);width:100%;max-width:760px;display:flex;flex-direction:column;max-height:calc(100vh - 80px)}
.modal h2{margin:0;padding:18px 22px 6px;font-size:16px}
.modal h2 .ctx{color:var(--text2);font-weight:500;font-size:13px;display:block;margin-top:2px}
.modal .body{padding:14px 22px;overflow:auto}
.modal .footer{padding:12px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:var(--surface2);border-radius:0 0 14px 14px}
.modal label{display:block;font-size:11.5px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;margin-top:12px}
.modal textarea,.modal input[type=text],.modal input[type=date],.modal select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface)}
.modal textarea{min-height:120px;resize:vertical;font-family:inherit;line-height:1.5}
.tpl-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.tpl-row button{background:var(--surface3);border:1px solid var(--border);padding:4px 10px;border-radius:6px;font-size:11.5px;color:var(--text2);font-weight:600}
.tpl-row button.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.row{display:flex;gap:10px}
.row > *{flex:1}
.hint-fase{font-size:11px;color:var(--brand-dark);background:var(--brand-soft);padding:5px 9px;border-radius:6px;display:inline-block;margin-top:5px;font-weight:600}

/* NE panel inside modal */
.ne-panel{border:1px solid var(--border);border-radius:10px;margin-bottom:14px;background:var(--surface2);overflow:hidden}
.ne-panel .head{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;justify-content:space-between;align-items:center}
.ne-panel .head .title{font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px}
.ne-panel .head .title .ico{width:22px;height:22px;border-radius:6px;background:var(--brand);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:12px}
.ne-panel .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px 14px}
.ne-stat{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:8px 10px}
.ne-stat .lbl{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;font-weight:700}
.ne-stat .val{font-size:14px;font-weight:700;font-family:var(--mono);margin-top:2px}
.ne-stat.score .val{color:var(--brand)}
.ne-stat.block .val{color:var(--red)}
.ne-decision{padding:10px 14px;background:#e6f8f6;border-top:1px solid var(--border);font-size:12.5px}
.ne-decision strong{color:var(--brand-dark)}
.ne-warns{padding:8px 14px;border-top:1px solid var(--border);background:#fff7e6}
.ne-warns ul{margin:4px 0 0 18px;padding:0;font-size:11.5px;color:#7a4a00}
.ne-missing{padding:8px 14px;border-top:1px solid var(--border);background:#fdecec;color:#7a1c1c;font-size:11.5px}
.ne-missing .missing-controls{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
.ne-email{border-top:1px solid var(--border);background:var(--surface)}
.ne-email .em-head{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:12.5px}
.ne-email .em-head .ap{font-size:10.5px;color:var(--text3);font-weight:500;margin-left:8px}
.ne-email .em-body{padding:10px 14px;border-top:1px solid var(--border2);background:var(--surface2)}
.ne-email .em-subj{font-size:12px;font-weight:600;margin-bottom:6px}
.ne-email .em-corpo{white-space:pre-wrap;font-family:var(--mono);font-size:11.5px;background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:10px;max-height:240px;overflow:auto}
.ne-email .em-actions{display:flex;gap:6px;margin-top:8px}
.collapse{cursor:pointer;user-select:none}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;padding:16px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.kpi .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;font-weight:700}
.kpi .val{font-size:22px;font-weight:800;font-family:var(--mono);margin-top:2px}
.kpi.green .val{color:var(--green)}
.kpi.red .val{color:var(--red)}
.kpi.amber .val{color:var(--amber)}
.painel-section{padding:0 16px 24px}
.panel-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px}
.panel-card h3{margin:0 0 10px;font-size:13.5px}
.cart-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:12px}
.cart-row .name{width:130px;color:var(--text2);font-weight:600}
.cart-row .bar2{flex:1;height:10px;background:var(--surface3);border-radius:999px;overflow:hidden}
.cart-row .bar2 > div{height:100%;background:var(--brand)}
.cart-row .nums{font-family:var(--mono);font-size:11.5px;color:var(--text2);min-width:72px;text-align:right}
.rank-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border2);font-size:12px}
.rank-row:last-child{border-bottom:0}
.rank-row .meta-info{font-size:11px;color:var(--text3)}
.rank-row .conc{font-family:var(--mono);font-weight:700;color:var(--brand-dark);font-size:13px}

.empty{padding:40px;text-align:center;color:var(--text3);font-size:13px}
.empty .ico{font-size:32px;margin-bottom:8px;opacity:.5}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 14px;border-radius:8px;font-size:12.5px;z-index:200;opacity:0;transform:translateY(10px);transition:.2s}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}

@media (max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}.ne-panel .grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="brand">
    <span class="logo">B</span>
    <span>Branddi</span><span class="sep">·</span><span class="sub">Auditoria</span>
    <span class="dept">Atendimento</span>
  </div>
  <span id="status-chip" class="status-chip"><span class="dot"></span> Supabase + Pipefy</span>
  <span id="last-sync" class="last-sync">último sync: —</span>
  <span class="spacer"></span>
  <button class="btn primary" id="btn-sync">↻ Sincronizar</button>
  <button class="btn" id="btn-clear">Limpar cache</button>
  <button class="btn ghost" id="btn-fases">Ver Fases</button>
  <button class="btn ghost" id="btn-config">⚙ Configurar</button>
  <button class="btn ghost" id="btn-resumo">📨 Enviar Resumo</button>
  <button class="btn ghost" id="btn-export">⬇ Exportar</button>
</header>

<!-- BANNER (sync progress / errors) -->
<div id="banner" class="banner hidden"></div>

<!-- SECTION TABS -->
<nav class="section-tabs" id="section-tabs">
  <button data-section="atrasos" class="active">Tarefas em Atraso <span class="count" id="c-atrasos">0</span></button>
  <button data-section="negacoes">CS - Negativações <span class="count" id="c-negacoes">0</span></button>
  <button data-section="outros">Atrasos - CS Front <span class="count" id="c-outros">0</span></button>
  <button data-section="painel">Painel Analítico</button>
</nav>

<!-- CARTEIRA TABS (shared by atrasos/negacoes/outros) -->
<nav class="carteira-tabs" id="carteira-tabs"></nav>

<!-- SUBFILTER (CS Front) -->
<nav class="subfilter" id="subfilter" style="display:none">
  <button data-sub="todos" class="active">Todos</button>
  <button data-sub="vencidos">Vencidos na Fase</button>
  <button data-sub="desatualizados">Desatualizados</button>
  <button data-sub="marketplace">Cadastro de Marketplace</button>
</nav>

<!-- FILTER BAR (search + fase + solicitação + progress) -->
<div class="filterbar" id="filterbar">
  <div class="search">
    <span class="ico">🔍</span>
    <input type="text" id="f-search" placeholder="Buscar cards..." autocomplete="off">
  </div>
  <select id="f-fase"><option value="">Todas as fases</option></select>
  <select id="f-solicitacao"><option value="">Todas as solicitações</option></select>
  <div class="spacer"></div>
  <div class="progress" title="Finalizados / Pendentes (na visão atual)">
    <span class="pct" id="f-pct">0%</span>
    <div class="track"><div id="f-bar"></div></div>
    <span class="chip ok"><span class="dot"></span><span id="f-ok">0</span> ok</span>
    <span class="chip pend"><span class="dot"></span><span id="f-pend">0</span> pend.</span>
  </div>
</div>

<!-- TABLE -->
<div class="table-wrap" id="table-wrap">
  <table class="audit" id="tbl">
    <thead><tr id="thead-tr"></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- PAINEL ANALÍTICO -->
<div id="painel-wrap" style="display:none">
  <div class="kpis" id="kpis"></div>
  <div class="painel-section">
    <div class="panel-card">
      <h3>Atrasos por Carteira</h3>
      <div id="cart-bars"></div>
    </div>
    <div class="panel-card">
      <h3>Conclusões por Analista (hoje)</h3>
      <div id="rank-analistas"></div>
    </div>
  </div>
</div>

<!-- MASS-SELECT BAR -->
<div class="mass-bar" id="mass-bar">
  <span class="count" id="mass-count">0 selecionados</span>
  <select id="mass-analyst"><option value="">Definir Analista…</option></select>
  <button class="btn" id="mass-apply-analyst">Aplicar Analista</button>
  <button class="btn" id="mass-sim">Marcar Sim</button>
  <button class="btn" id="mass-nao">Marcar Não</button>
  <span class="spacer" style="flex:1"></span>
  <button class="btn ghost" id="mass-clear">✕ Limpar</button>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal-bg">
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <h2 id="modal-title">Comentar
      <span class="ctx" id="modal-ctx"></span>
    </h2>
    <div class="body" id="modal-body"></div>
    <div class="footer" id="modal-footer">
      <button class="btn ghost" id="modal-cancel">Cancelar</button>
      <button class="btn primary" id="modal-confirm">Publicar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

function carteiraPorTitulo(titulo){
  if (!titulo) return 'Sem Carteira';
  const t = String(titulo).trim();
  if (MAPA_CARTEIRAS[t]) return MAPA_CARTEIRAS[t];
  const tLow = t.toLowerCase();
  // exato case-insensitive
  for (const k of Object.keys(MAPA_CARTEIRAS)){
    if (k.toLowerCase() === tLow) return MAPA_CARTEIRAS[k];
  }
  // startsWith / parcial
  for (const k of Object.keys(MAPA_CARTEIRAS)){
    const kLow = k.toLowerCase();
    if (tLow.startsWith(kLow) || tLow.includes(kLow)) return MAPA_CARTEIRAS[k];
  }
  return 'Sem Carteira';
}

function $(s, root=document){ return root.querySelector(s); }
function $$(s, root=document){ return [...root.querySelectorAll(s)]; }
function el(tag, attrs={}, ...kids){
  const n = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})){
    if (k==='class') n.className = v;
    else if (k==='style' && typeof v==='object') Object.assign(n.style, v);
    else if (k.startsWith('on') && typeof v==='function') n.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v===false || v===null || v===undefined) {}
    else n.setAttribute(k, v);
  }
  for (const k of kids){
    if (k===null || k===undefined || k===false) continue;
    n.appendChild(typeof k==='string' ? document.createTextNode(k) : k);
  }
  return n;
}
function toast(msg, type=''){
  const t = $('#toast');
  t.className = 'toast show ' + type;
  t.textContent = msg;
  clearTimeout(t._h);
  t._h = setTimeout(()=>{ t.className='toast '+type; }, 2400);
}
function banner(msg, kind=''){ // kind: '' | 'warn' | 'err'
  const b = $('#banner');
  if (!msg){ b.className='banner hidden'; b.innerHTML=''; return; }
  b.className = 'banner ' + kind;

}
function debounce(fn, ms=800){
  let h; return (...args)=>{ clearTimeout(h); h=setTimeout(()=>fn(...args), ms); };
}
function fmtDate(d){
  if (!d) return '—';
  const dt = (typeof d==='string') ? new Date(d) : d;
  if (isNaN(dt)) return '—';
  return dt.toLocaleDateString('pt-BR');
}
function todayBRStr(){
  const d = new Date(Date.now() - 3*3600*1000); // UTC-3
  return d.toISOString().slice(0,10);
}
// Excel serial → JS Date (epoch 30/12/1899)
function excelToDate(serial){
  if (serial === null || serial === undefined || serial === '') return null;
  const n = Number(serial);
  if (!Number.isFinite(n)) {
    const d = new Date(serial);
    return isNaN(d) ? null : d;
  }
  const ms = (n - 25569) * 86400000;
  return new Date(ms);
}
function diasAtraso(dueDate){
  if (!dueDate) return null;
  const d = (typeof dueDate==='string') ? new Date(dueDate) : dueDate;
  if (isNaN(d)) return null;
  const today = new Date();
  today.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.floor((today - d)/86400000);
}
function isFinalizadoHoje(ctrl){
  if (!ctrl || ctrl.finalizado !== 'Sim' || !ctrl.updated_at) return false;
  const upd = new Date(ctrl.updated_at);
  if (isNaN(upd)) return false;
  // ajustar para UTC-3
  const updBR = new Date(upd.getTime() - 3*3600*1000);
  return updBR.toISOString().slice(0,10) === todayBRStr();
}

/* ============================================================
   PIPEFY GraphQL
   ============================================================ */
async function pipefy(query, variables){
  if (!CONFIG.pipefyToken){
    throw new Error('Pipefy token não configurado — clique em ⚙ Configurar');
  }
  const res = await fetch('https://api.pipefy.com/graphql', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer '+CONFIG.pipefyToken,
    },
    body: JSON.stringify({query, variables}),
  });
  if (!res.ok) throw new Error('Pipefy HTTP '+res.status);
  const json = await res.json();
  if (json.errors) throw new Error('Pipefy GQL: '+JSON.stringify(json.errors));
  return json.data;
}

// Busca uma página de cards de uma fase específica
async function fetchPhasePage(phaseId, first, after){
  const q = `query($id:ID!,$first:Int,$after:String){
    phase(id:$id){
      cards(first:$first, after:$after){
        edges{ node{ id title url due_date current_phase{name} updated_at fields{name value} } }
        pageInfo{ endCursor hasNextPage }
      }
    }
  }`;
  const d = await pipefy(q, {id:phaseId, first, after});
  const edges = d.phase?.cards?.edges || [];
  return {
    cards: edges.map(e => e.node),
    next: d.phase?.cards?.pageInfo?.hasNextPage ? d.phase.cards.pageInfo.endCursor : null,
  };
}

// Pagina todas as fases informadas (1ª página em paralelo + restante serial por fase)
async function fetchPhases(phaseIds){
  if (!phaseIds.length) return [];
  const firstResults = await Promise.all(phaseIds.map(pid => fetchPhasePage(pid, 50, null)));
  const all = [];
  const tails = [];
  firstResults.forEach((r, idx) => {
    all.push(...r.cards);
    if (r.next) tails.push({phaseId: phaseIds[idx], cursor: r.next});
  });
  for (const t of tails){
    let after = t.cursor;
    let safety = 50;
    while (after && safety-- > 0){
      const more = await fetchPhasePage(t.phaseId, 100, after);
      all.push(...more.cards);
      after = more.next;
    }
  }
  return all;
}

// Resolve a lista de phaseIds que o tipo precisa (incluindo 'auto-except')
async function resolvePhaseIds(tc){
  if (Array.isArray(tc.phaseIds)) return tc.phaseIds;
  if (tc.phaseIds === 'auto-except'){
    const d = await pipefy(`{ pipe(id: ${tc.pipeId}) { phases { id } } }`);
    const all = (d.pipe?.phases||[]).map(p => p.id);
    return all.filter(id => !(tc.excludeIds||[]).includes(id));
  }
  return [];
}

   SYNC — 5 tipos em paralelo
   ============================================================ */
const TIPOS_CONFIG = [
  // ATRASOS: pipe Atividades, fases ativas (sem StandBy/Concluídos Geral), filtro due<=hoje
  { tipo:'atrasos', pipeId: 302656757, phaseIds: [
    '316588910','324961154','324961137','320305552','319202807','342038111','342956092'
  ], filterDueBeforeToday: true },

  // MARKETPLACE: pipe Atividades, fase Cadastro de Marketplace
  { tipo:'marketplace', pipeId: 302656757, phaseIds: ['342956092'] },
  // VENCIDOS NA FASE: pipe Fluxo Clientes, todas exceto Churn/+12m/StandBy/Renovação/Churn-reversão
  { tipo:'vencidos', pipeId: 302483272, phaseIds: 'auto-except', excludeIds: [
    '318305336','317119749','320628025','342124327','333615572'
  ]},
  // DESATUALIZADOS: TODO — depende de cruzar updated_at do último comentário.
  // Por ora vai junto com 'vencidos'; o agente/UI pode filtrar depois.
];

async function syncPipefy(){
  if (state.syncing) return;
  state.syncing = true;
  banner(`Sincronizando ${TIPOS_CONFIG.length} tipos do Pipefy… <span class="bar"><div id="sync-bar"></div></span>`);
  const setBar = (p)=>{ const b=$('#sync-bar'); if (b) b.style.width = p+'%'; };
  setBar(10);
  try {
    // Passo 1: resolver phaseIds de cada tipo
    const tipoPhaseIds = {};
    for (const tc of TIPOS_CONFIG){
      tipoPhaseIds[tc.tipo] = await resolvePhaseIds(tc);
    }
    // Passo 2: fetch único por fase (mesma fase em vários tipos = 1 chamada só)
    const allPhases = [...new Set(Object.values(tipoPhaseIds).flat())];
    setBar(20);
    const phaseNodesMap = {};
    const nodesArr = await Promise.all(allPhases.map(async (pid, idx) => {
      // Pagina cada fase isoladamente
      const out = [];
      let first = await fetchPhasePage(pid, 50, null);
      out.push(...first.cards);
      let cursor = first.next, safety = 50;
      while (cursor && safety-- > 0){
        const m = await fetchPhasePage(pid, 100, cursor);
        out.push(...m.cards);
        cursor = m.next;
      }
      setBar(20 + Math.round(60*(idx+1)/allPhases.length));
      return [pid, out];
    }));
    nodesArr.forEach(([pid, nodes]) => { phaseNodesMap[pid] = nodes; });

    // Passo 3: monta a lista de cards POR tipo (mesmo node pode virar 2 cards de tipos diferentes)
    const cards = [];
    for (const tc of TIPOS_CONFIG){
      for (const pid of tipoPhaseIds[tc.tipo]){
        for (const node of (phaseNodesMap[pid]||[])){
          cards.push(normalizarCard(node, tc));
        }
      }
    }

    // Atrasos: due_date <= hoje. EXCEÇÃO: cards de Backlog/Pedidos com
    // "Sugestão de notificação extrajudicial" sempre aparecem (mesmo com due futuro)
    // — esses são o foco do agente NE.
    const today = new Date(); today.setHours(0,0,0,0);
    state.cards = cards.filter(c => {
      if (c.tipo === 'atrasos'){
        const isSugestaoNE = c.fase === 'Backlog / Pedidos'
          && (c.solicitacao||'').trim().toLowerCase() === 'sugestão de notificação extrajudicial';
        if (isSugestaoNE) return true;
        if (!c.data_vencimento) return false;
        const d = new Date(c.data_vencimento); d.setHours(0,0,0,0);
        if (d > today) return false;
      }
      return true;
    });

    // Cross-reference: INPI nativo do Fluxo Clientes → cards de NE
    state.clienteToInpi = {};
    for (const c of state.cards){
      if (c.tipo === 'vencidos' && c.inpi_field && c.titulo){
        state.clienteToInpi[c.titulo.toLowerCase().trim()] = c.inpi_field;
      }
    }

    // Upsert no Supabase: dedupe por id (mesma card pode aparecer como atrasos+negacoes).
    // Prioridade do tipo: negacoes > marketplace > vencidos > atrasos.
    if (supa && state.cards.length){
      const prio = { negacoes:4, marketplace:3, vencidos:2, atrasos:1 };
      const byId = new Map();
      for (const c of state.cards){
        const cur = byId.get(c.id);
        if (!cur || (prio[c.tipo]||0) > (prio[cur.tipo]||0)) byId.set(c.id, c);
      }
      const rows = [...byId.values()].map(c => ({
        id: c.id, titulo: c.titulo, tipo: c.tipo, carteira: c.carteira,
        responsavel: c.responsavel, fase: c.fase,
        data_vencimento: c.data_vencimento, dias_atraso: c.dias_atraso,
        solicitacao: c.solicitacao, concorrente: c.concorrente,
        link_pipefy: c.link_pipefy, data_onboarding: c.data_onboarding,
        pipe_id: c.pipe_id, report_id: null,
        synced_at: new Date().toISOString(),
      }));
      const chunks = [];
      for (let i=0;i<rows.length;i+=200) chunks.push(rows.slice(i,i+200));
      for (const ch of chunks){
        await supa.from('auditoria_cards').upsert(ch, {onConflict:'id'});
      }
    }

    state.lastSync = new Date();
    localStorage.setItem('branddi.lastSync', state.lastSync.toISOString());
    $('#last-sync').textContent = 'último sync: '+state.lastSync.toLocaleTimeString('pt-BR');

    // carregar controles e análises NE em paralelo
    await Promise.all([ loadSupabaseControles(), loadSupabaseNEAnalises() ]);

    // disparar agente NE em background para cards elegíveis
    scheduleNEAgentForNewCards();

    banner('');
    toast('Sincronização concluída · '+state.cards.length+' cards', 'ok');
  } catch (e){
    console.error(e);
    banner('Erro ao sincronizar: '+e.message, 'err');
    toast('Erro na sincronização', 'err');
  } finally {
    state.syncing = false;
    renderAll();
  }
}

// Parse JSON array do Pipefy. Ex: '["Titanium 2"]' → 'Titanium 2'. Fallback retorna a string original.
function parseArrFirst(s){
  if (!s) return '';
  const str = String(s).trim();
  if (str.startsWith('[')){
    try {
      const arr = JSON.parse(str);
      if (Array.isArray(arr) && arr.length) return String(arr[0]);
    } catch {}
  }
  return str;
}
function parseArrAll(s){
  if (!s) return [];
  const str = String(s).trim();
  if (str.startsWith('[')){
    try { const arr = JSON.parse(str); if (Array.isArray(arr)) return arr.map(String); } catch {}
  }
  return [str];
}

function parseDateBR(s){
  if (!s) return null;
  const str = String(s).trim();
  // dd/mm/aaaa
  const m = str.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1]);
  // ISO ou outro
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function normalizarCard(node, tc){
  const fmap = {};
  for (const f of (node.fields || [])){
    fmap[(f.name||'').toLowerCase().trim()] = f.value;
  }

  const titulo = node.title
    || parseArrFirst(fmap['campanha'])
    || parseArrFirst(fmap['nome do cliente'])
    || '';

  // Carteira: campo nativo do Pipefy (com ou sem "(Preenchimento automático)").
  let carteira = parseArrFirst(fmap['categoria do cliente (preenchimento automático)'])
              || parseArrFirst(fmap['categoria do cliente'])
              || '';
  if (!carteira) carteira = carteiraPorTitulo(titulo);

  // Data de vencimento: node.due_date é ISO direto da API
  let dueDate = node.due_date ? new Date(node.due_date) : null;
  if (dueDate && isNaN(dueDate)) dueDate = null;

  const onbDate = parseDateBR(fmap['data do onboarding'] || fmap['data de onboarding'] || fmap['onboarding']);

  return {
    id: node.id,
    titulo,
    tipo: tc.tipo,
    carteira,
    responsavel: parseArrFirst(fmap['solicitante']) || parseArrFirst(fmap['responsável']) || parseArrFirst(fmap['responsavel']) || '',
    fase: node.current_phase?.name || '',
    data_vencimento: dueDate ? dueDate.toISOString() : null,
    dias_atraso: diasAtraso(dueDate),
    solicitacao: fmap['solicitação'] || fmap['solicitacao'] || '',
    concorrente: fmap['concorrente'] || fmap['domínio do concorrente'] || fmap['dominio'] || '',
    link_pipefy: node.url || '',
    data_onboarding: onbDate ? onbDate.toISOString() : null,
    inpi_field: fmap['inpi'] || null, // nativo no Fluxo Clientes (Nominativo/Misto)
    pipe_id: tc.pipeId,
  };
}

/* ============================================================
   PERSISTÊNCIA DE CONTROLES (debounced)
   ============================================================ */
const _pendingCtrl = {};
const _flushCtrl = debounce(async () => {
  if (!supa) return;
  const rows = Object.values(_pendingCtrl);
  if (!rows.length) return;
  Object.keys(_pendingCtrl).forEach(k => delete _pendingCtrl[k]);
  for (const r of rows){
    r.updated_at = new Date().toISOString();
    state.controles[r.card_id] = {...(state.controles[r.card_id]||{}), ...r};
  }
  banner('Salvando…');
  try {
    const { error } = await supa.from('auditoria_controles').upsert(rows, {onConflict:'card_id'});
    if (error) throw error;
    banner('');
    toast('Salvo', 'ok');
  } catch(e){
    banner('Erro ao salvar: '+e.message, 'err');
  }
}, 800);

function persistCtrl(cardId, patch){
  const card = state.cards.find(c=>c.id===cardId);
  const prev = _pendingCtrl[cardId] || state.controles[cardId] || {card_id: cardId, carteira: card?.carteira || ''};
  _pendingCtrl[cardId] = {...prev, ...patch, card_id:cardId};
  state.controles[cardId] = {...(state.controles[cardId]||{}), ...patch, card_id:cardId, updated_at:new Date().toISOString()};
  _flushCtrl();
  // Atualiza chips de progresso na hora (se finalizado mudou)
  if (patch && Object.prototype.hasOwnProperty.call(patch,'finalizado')) updateProgress();
}

/* ============================================================
   BMS API
   ============================================================ */
async function fetchBMS(card){
  // BMS = MongoDB Atlas — acessado via Edge Function do Supabase (proxy seguro).
  // A function 'bms-lookup' precisa estar deployada. Ver supabase/functions/bms-lookup/index.ts
  if (!CONFIG.supabaseUrl?.startsWith('http') || !CONFIG.supabaseKey) return null;
  const dom = card.concorrente || '';
  if (!dom) return null;
  const url = `${CONFIG.supabaseUrl.replace(/\/$/,'')}${CONFIG.bmsProxyPath||'/functions/v1/bms-lookup'}`;
  try {
    const res = await fetch(url, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+CONFIG.supabaseKey,
        'apikey': CONFIG.supabaseKey,
      },
      body: JSON.stringify({ cliente: card.titulo, dominio: dom })
    });
    if (!res.ok){ console.warn('BMS lookup HTTP', res.status); return null; }
    const json = await res.json();
    // Edge Function pode retornar { ok:true, data:{...} } ou direto o objeto.
    return json?.data || json;
  } catch(e){ console.warn('BMS falhou', e); return null; }
}

/* ============================================================
   AGENTE NE — Etapas 0-4
   ============================================================ */
function deveAnalisarNE(card){
  // Agente atua EXCLUSIVAMENTE em:
  //   fase === "Backlog / Pedidos"  E  solicitacao === "Sugestão de notificação extrajudicial"
  // Qualquer outra combinação (fase diferente, ou solicitação diferente) é ignorada.
  if (card.fase !== 'Backlog / Pedidos') return false;
  const sol = (card.solicitacao||'').trim().toLowerCase();
  return sol === 'sugestão de notificação extrajudicial'
      || sol === 'sugestao de notificacao extrajudicial';
}

// Identificar fase do caso a partir de comentários (Pipefy GraphQL)
async function fetchComentarios(cardId){
  const q = `query($id:ID!){ card(id:$id){ comments{ id text created_at author{name} } } }`;
  try {
    const d = await pipefy(q, {id:cardId});
    return d.card?.comments || [];
  } catch { return []; }
}
function identificarFase(coments){
  const all = (coments||[]).map(c => (c.text||'').toLowerCase()).join('\n');
  if (/carta com ar|reenvio por carta|rastreamento.*correios|sedex|registro postal/.test(all)) return 'Fase 3';
  if (/notificaç[aã]o extrajudicial por e-?mail|minuta enviada|via escrit[oó]rio parceiro/.test(all)) return 'Fase 2';
  return 'Fase 1';
}

// Etapa 2 — Score
function calcularScore(bms){
  const s = { A_termo:0, B_segmento:0, C1_ranking:0, C2_bms:0, D_frequencia:0, E_posicionamento:0, F_ciencia:0, G_topleilao:0, total:0 };
  if (!bms) return s;

  // A. Característica do Termo
  const t = (bms.caracteristica_termo||'').toLowerCase();
  s.A_termo = t==='puro' ? 25 : t==='composto' ? 15 : t==='genérico'||t==='generico' ? 5 : 0;

  // B. Segmento
  const seg = (bms.segmento_concorrente||'').toLowerCase();
  s.B_segmento = seg.includes('mesmo') ? 20 : seg.includes('correlato') ? 10 : 0;

  // C1. Ranking
  const pr = Number(bms.posicao_ranking)||0;
  s.C1_ranking = (pr>0 && pr<=5) ? 5 : (pr>=6 && pr<=10) ? 3 : 0;

  // C2. Nota BMS
  const nb = Number(bms.nota_bms)||0;
  s.C2_bms = nb>=9 ? 10 : nb>=6 ? 7 : nb>=3 ? 4 : 0;

  // D. Frequência
  const oc14 = Number(bms.ocorrencias_14d)||0, oc7 = Number(bms.ocorrencias_7d)||0;
  s.D_frequencia = (oc14>0 && oc7>0) ? 15 : 0;

  // E. Posicionamento
  const pos = (bms.posicionamento_concorrente||'').toLowerCase();
  s.E_posicionamento = pos.includes('recus') || bms.tag_top_leilao_ativo ? 15 : pos.includes('sem') ? 5 : 0;

  // F. Ciência
  s.F_ciencia = bms.ciencia_negativacao ? 5 : 0;

  // G. Tag Top Leilão
  s.G_topleilao = bms.tag_top_leilao_ativo ? 5 : 0;

  s.total = s.A_termo+s.B_segmento+s.C1_ranking+s.C2_bms+s.D_frequencia+s.E_posicionamento+s.F_ciencia+s.G_topleilao;
  return s;
}

// Etapa 3 — Árvore de decisão
function decidirAcao(faseNE, score, bms){
  const total = score.total;
  const top5 = (Number(bms?.posicao_ranking)||99) <= 5;
  const abertura = !!bms?.ciencia_negativacao;
  const autorizou = String(bms?.cliente_autorizou_envio||'').toLowerCase() === 'sim';

  if (faseNE === 'Fase 1'){
    if (total < 11) return { decisao:'Monitorar (score baixo, sem ação)', apendice:null };
    if (total >= 11 && top5 && abertura) return { decisao:'Dossiê jurídico + contraprova + NE Digital', apendice:'B' };
    return { decisao:'GreenSign para OPEC', apendice:'B' };
  }
  if (faseNE === 'Fase 2'){
    if (total < 13) return { decisao:'Whitelist (score baixo)', apendice:'F' };
    if (total >= 13 && !autorizou) return { decisao:'Whitelist (cliente não autorizou)', apendice:'F' };
    if (total >= 13 && autorizou) return { decisao:'NE via Carta com AR', apendice:'C' };
  }
  if (faseNE === 'Fase 3'){
    if (total < 15) return { decisao:'Whitelist (score baixo p/ litígio)', apendice:'F' };
    if (total >= 15) return { decisao:'Litígio — via PFFA (D) ou internamente (E)', apendice:'D' };
  }
  return { decisao:'Sem decisão', apendice:null };
}

    .replaceAll('[NOME DO AGRESSOR]', ctx.agressor||'[NOME DO AGRESSOR]')

  return { assunto: repl(tpl.assunto), corpo: repl(tpl.corpo) };

// Rodar agente para 1 card
async function rodarAgenteNE(card){
  if (!deveAnalisarNE(card)) return null;
  // marca como analisando (UI)
  state.neAnalises[card.id] = state.neAnalises[card.id] || {};
  state.neAnalises[card.id]._loading = true;
  renderTableSoft();

  const [bmsRes, comentsRes] = await Promise.allSettled([
    fetchBMS(card),
    fetchComentarios(card.id),
  ]);
  const bms = bmsRes.status==='fulfilled' ? bmsRes.value : null;
  const coments = comentsRes.status==='fulfilled' ? comentsRes.value : [];
  const faseNE = identificarFase(coments);

  // INPI: 1) manual do analista; 2) campo INPI nativo do Fluxo Clientes (cross-ref por nome); 3) null
  const tituloKey = (card.titulo||'').toLowerCase().trim();
  let inpiStatus = state.neAnalises[card.id]?.inpi_status_manual
                || state.clienteToInpi?.[tituloKey]
                || null;

  // Etapa 1 — Filtro Eliminatório
  let bloqueado = false, motivo = null;
  if (inpiStatus === 'Sem registro' || inpiStatus === 'Arquivada'){
    bloqueado = true;
    motivo = 'Marca sem registro ativo no INPI. Caso não deve seguir para NE salvo orientação expressa do CS Front, cliente ou Jurídico.';
  }
  // INPI indisponível: NÃO bloqueia, mas exige ressalva obrigatória no e-mail
  const inpiIndisponivel = inpiStatus === 'INPI indisponível';

  const score = calcularScore(bms);
  const pontos = [];
  if (!bloqueado && score.D_frequencia === 0) pontos.push('Frequência zerada — reavaliar antes de progredir.');
  if (bms){
    const t = (bms.caracteristica_termo||'').toLowerCase();
    if (t==='composto' || t==='genérico' || t==='generico') pontos.push('Termo '+t+': risco aumentado em litígio. Ponderar.');
  }
  if (inpiIndisponivel) pontos.push('⚠ INPI indisponível no momento da análise — prosseguir com ressalva obrigatória; reconfirmar registro antes do envio definitivo.');

  // dados ausentes
  const dados_ausentes = [];
  if (!bms) dados_ausentes.push('BMS (toda a resposta)');
  else {
    for (const k of ['caracteristica_termo','segmento_concorrente','posicao_ranking','nota_bms','ocorrencias_14d','ocorrencias_7d','posicionamento_concorrente','cliente_autorizou_envio']){
      if (bms[k] === undefined || bms[k] === null || bms[k] === '') dados_ausentes.push('BMS.'+k);
    }
  }
  if (!inpiStatus) dados_ausentes.push('INPI (status manual)');

  // Decisão
  let decisao = '—', apendice = null;
  if (!bloqueado){
    const d = decidirAcao(faseNE, score, bms);
    decisao = d.decisao; apendice = d.apendice;
  } else {
    decisao = motivo;
  }

  // Email
  const emailCtx = {
    cliente: card.titulo,
    agressor: card.concorrente || '[NOME DO AGRESSOR]',
    dominio: card.concorrente || '[DOMÍNIO]',
    termos: bms?.termo || '[TERMOS]',
    topx: bms?.posicao_ranking ? ('Top '+bms.posicao_ranking) : '[TOP X]',
    analista: state.controles[card.id]?.analista || '',
    motivos: pontos.join('; ') || '[MOTIVOS]',
  };
  const { assunto, corpo } = bloqueado || !apendice ? {assunto:'',corpo:''} : gerarEmail(apendice, emailCtx);

  const analise = {
    card_id: card.id,
    fase_ne: faseNE,
    inpi_status: inpiStatus || 'Não localizado',
    inpi_status_manual: inpiStatus, // preservar
    bloqueado, motivo_bloqueio: motivo,
    score_json: score,
    pontos_atencao: pontos,
    dados_ausentes,
    decisao,
    email_assunto: assunto,
    email_corpo: corpo,
    apendice_usado: apendice,
    analisado_at: new Date().toISOString(),
  };

  state.neAnalises[card.id] = analise;
  if (supa) {
    try { await supa.from('auditoria_ne_analises').upsert(analise, {onConflict:'card_id'}); }
    catch(e){ console.warn('persist NE falhou', e); }
  }
  renderTableSoft();
  return analise;
}

// Dispara agente em background para cards novos / análises antigas
function scheduleNEAgentForNewCards(){
  // dedupe por id (mesmo card pode estar em state.cards como atrasos E negacoes)
  const seen = new Set();
  const elegiveis = state.cards.filter(c => {
    if (seen.has(c.id)) return false;
    if (!deveAnalisarNE(c)) return false;
    seen.add(c.id);
    return true;
  });
  const agora = Date.now();
  const SEIS_HORAS = 6*3600*1000;
  const fila = elegiveis.filter(c => {
    const a = state.neAnalises[c.id];
    if (!a) return true;
    if (a._loading) return false;
    const ts = a.analisado_at ? new Date(a.analisado_at).getTime() : 0;
    return (agora - ts) > SEIS_HORAS;
  });
  // throttle: 3 por vez
  let i = 0;
  const next = async () => {
    if (i >= fila.length) return;
    const batch = fila.slice(i, i+3);
    i += 3;
    await Promise.allSettled(batch.map(rodarAgenteNE));
    setTimeout(next, 200);
  };
  next();
}

function updateProgress(){
  const vis = cardsVisiveis();
  let ok = 0;
  for (const c of vis){
    if (state.controles[c.id]?.finalizado === 'Sim') ok++;
  }
  const pend = vis.length - ok;
  const pct = vis.length ? Math.round(100*ok/vis.length) : 0;
  const okEl = $('#f-ok'), pendEl = $('#f-pend'), pctEl = $('#f-pct'), barEl = $('#f-bar');
  if (okEl) okEl.textContent = ok;
  if (pendEl) pendEl.textContent = pend;
  if (pctEl) pctEl.textContent = pct + '%';
  if (barEl) barEl.style.width = pct + '%';
}

// Cards após filtros de section + sub (antes de carteira/busca/fase/solicitação)
function cardsBySection(){
  let arr = state.cards.slice();
  if (state.section==='atrasos') arr = arr.filter(c=>c.tipo==='atrasos');
  else if (state.section==='negacoes') arr = arr.filter(c=>c.tipo==='negacoes');
  else if (state.section==='outros'){
    const allowed = SUB_TIPOS[state.sub] || SUB_TIPOS.todos;
    arr = arr.filter(c=>allowed.includes(c.tipo));
  }
  return arr;
}

// Cards após section + sub + carteira (antes da busca/fase/solicitação)
function cardsForFilterBar(){
  let arr = cardsBySection();
  if (state.carteira !== 'Todos') arr = arr.filter(c=>c.carteira===state.carteira);
  return arr;
}

function cardsVisiveis(){
  let arr = cardsForFilterBar();
  // busca (título, concorrente, solicitação, responsável)
  const q = state.search.trim().toLowerCase();
  if (q){
    arr = arr.filter(c => {
      const hay = [c.titulo, c.concorrente, c.solicitacao, c.responsavel, c.fase].join(' ').toLowerCase();
      return hay.includes(q);
    });
  }
  if (state.faseFilter) arr = arr.filter(c => c.fase === state.faseFilter);
  if (state.solicitacaoFilter) arr = arr.filter(c => c.solicitacao === state.solicitacaoFilter);

  // sort
  const {col, dir} = state.sort;
  arr.sort((a,b) => {
    let va = a[col], vb = b[col];
    if (col==='data_vencimento'){ va = va? new Date(va).getTime():0; vb = vb? new Date(vb).getTime():0; }
    if (va==null) va=''; if (vb==null) vb='';
    if (va<vb) return dir==='asc'?-1:1;
    if (va>vb) return dir==='asc'?1:-1;
    return 0;
  });
  return arr;
}

        case 'data_vencimento':{
          td.className='cell-vencimento';
          if (card.data_vencimento){
            td.appendChild(document.createTextNode(fmtDate(card.data_vencimento)));
            const d = card.dias_atraso;
            if (d!=null){
              const cls = d>0?'':d===0?'zero':'ok';
              td.appendChild(el('span',{class:'dias '+cls}, d>0?(`+${d}d`):(d===0?'hoje':`${d}d`)));
            }
          } else td.textContent = '—';
          break;
        }
        case 'finalizado':{
          const sel = el('select',{class:'ctrl-select '+(ctrl.finalizado==='Sim'?'sim':ctrl.finalizado==='Não'?'nao':'')},
            el('option',{value:''},'—'),
            el('option',{value:'Sim'},'Sim'),
            el('option',{value:'Não'},'Não'),
          );
          sel.value = ctrl.finalizado || '';
          sel.onchange = ()=>{
            persistCtrl(card.id, {finalizado:sel.value||null});
            sel.className = 'ctrl-select '+(sel.value==='Sim'?'sim':sel.value==='Não'?'nao':'');
          };
          td.appendChild(sel);
          break;
        }
        case 'analista':{
          const sel = el('select',{class:'ctrl-select'},
            el('option',{value:''},'—'),
            ...ANALISTAS.map(a=>el('option',{value:a}, a))
          );
          sel.value = ctrl.analista || '';
          sel.onchange = ()=> persistCtrl(card.id, {analista:sel.value||null});
          td.appendChild(sel);
          break;
        }
        case 'obs':{
          const ta = el('textarea',{class:'ctrl-text', placeholder:'Observações…'});
          ta.value = ctrl.obs || '';
          ta.oninput = ()=> persistCtrl(card.id, {obs:ta.value});
          td.appendChild(ta);
          break;
        }
        case 'validacao':{
          const ta = el('textarea',{class:'ctrl-text', placeholder:'Validação…'});
          ta.value = ctrl.validacao || '';
          ta.oninput = ()=> persistCtrl(card.id, {validacao:ta.value});
          td.appendChild(ta);
          break;
        }
        case 'ne_status':
          td.appendChild(neBadge(card));
          break;
        case 'acao':{
          td.appendChild(el('button',{class:'btn primary sm', onclick:()=>openComentModal(card)},'💬 Comentar'));
          break;
        }
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  // sel-all
  const selAll = $('#sel-all');
  if (selAll){
    selAll.checked = cards.length>0 && cards.every(c=>state.selected.has(c.id));
    selAll.onchange = ()=>{
      cards.forEach(c => selAll.checked ? state.selected.add(c.id) : state.selected.delete(c.id));
      renderTable();
      updateMassBar();
    };
  }
  updateMassBar();
}

   PAINEL ANALÍTICO
   ============================================================ */
function renderPainel(){
  const today = state.cards;
  const ctrls = state.controles;

  const atrasos = today.filter(c=>c.tipo==='atrasos');
  const concluidosAtrasos = atrasos.filter(c => isFinalizadoHoje(ctrls[c.id]));
  const pendentes = atrasos.length - concluidosAtrasos.length;
  const vencidos = today.filter(c=>c.tipo==='vencidos').length;
  const desat = today.filter(c=>c.tipo==='desatualizados').length;
  const mark = today.filter(c=>c.tipo==='marketplace').length;

  const kpis = [
    {lbl:'Atrasos Total', val:atrasos.length},
    {lbl:'Pendentes', val:pendentes, css:'red'},
    {lbl:'Concluídos hoje', val:concluidosAtrasos.length, css:'green'},
    {lbl:'Vencidos na Fase', val:vencidos, css:'amber'},
    {lbl:'Desatualizados', val:desat, css:'amber'},
    {lbl:'Cadastro Marketplace', val:mark},
  ];
  const wrap = $('#kpis'); wrap.innerHTML = '';
  for (const k of kpis){
    wrap.appendChild(el('div',{class:'kpi '+(k.css||'')},
      el('div',{class:'lbl'}, k.lbl),
      el('div',{class:'val'}, String(k.val))
    ));
  }

  // Atrasos por carteira
  const cb = $('#cart-bars'); cb.innerHTML = '';
  const totalA = atrasos.length || 1;
  for (const c of CARTEIRAS){
    const n = atrasos.filter(x=>x.carteira===c).length;
    const pct = n*100/totalA;
    cb.appendChild(el('div',{class:'cart-row'},
      el('div',{class:'name'}, c),
      el('div',{class:'bar2'}, el('div',{style:{width:pct+'%'}})),
      el('div',{class:'nums'}, `${n} (${pct.toFixed(0)}%)`)
    ));
  }

  // Ranking analistas
  const ra = $('#rank-analistas'); ra.innerHTML = '';
  const byAnalyst = {};
  for (const c of atrasos){
    const k = state.controles[c.id]?.analista;
    if (!k || !isFinalizadoHoje(state.controles[c.id])) continue;
    byAnalyst[k] = (byAnalyst[k]||0)+1;
  }
  const all = ANALISTAS.map(a => ({a, n: byAnalyst[a]||0, meta: METAS_ANALISTA[a]||null}));
  all.sort((x,y)=>y.n-x.n);
  for (const row of all){
    ra.appendChild(el('div',{class:'rank-row'},
      el('div', {},
        el('strong',{},row.a),
        row.meta ? el('div',{class:'meta-info'}, 'Meta: '+row.meta.join(', ')) : null,
      ),
      el('div',{class:'conc'}, String(row.n))
    ));
  }
}

function renderModalBody(card){
  const body = $('#modal-body');
  body.innerHTML = '';
  const tipo = card.tipo;

  // 1) Painel NE — só Negativações elegíveis
  if (deveAnalisarNE(card)){
    body.appendChild(renderNEPanel(card));
  }

  // 2) Templates
  const tpls = TEMPLATES_COM[tipo] || [{label:'Livre',text:''}];
  const tplRow = el('div',{class:'tpl-row'});
  const ta = el('textarea',{id:'cm-text', placeholder:'Texto do comentário'});
  tpls.forEach((t,i)=>{
    const b = el('button',{type:'button', class: i===0?'active':'', onclick:()=>{
      $$('.tpl-row button', body).forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      ta.value = t.text;
    }}, t.label);
    tplRow.appendChild(b);
  });
  body.appendChild(el('label',{}, 'Template'));
  body.appendChild(tplRow);
  body.appendChild(el('label',{}, 'Comentário'));
  body.appendChild(ta);

  // 3) Vencimento + Fase (opcional vs obrigatório)
  const showDue = ['atrasos','vencidos'].includes(tipo);
  const showFase = ['atrasos','vencidos'].includes(tipo);
  if (showDue || showFase){
    const row = el('div',{class:'row'});
    if (showDue){
      const wrap = el('div',{},
        el('label',{}, 'Novo vencimento '+(tipo==='vencidos'?'(obrigatório)':'(opcional)')),
        el('input',{type:'date', id:'cm-due'})
      );
      row.appendChild(wrap);
    }
    if (showFase){
      const wrap = el('div',{},
        el('label',{}, 'Mover para fase '+(tipo==='vencidos'?'(obrigatório)':'(opcional)')),
        el('input',{type:'text', id:'cm-phase', placeholder:'Nome ou ID da fase de destino'}),
      );
      row.appendChild(wrap);
    }
    body.appendChild(row);
    if (tipo==='vencidos'){
      body.appendChild(el('div',{class:'hint-fase'}, '⚠ Para Vencidos na Fase, vencimento e fase são obrigatórios.'));
      body.appendChild(el('label',{}, 'Data de OnBoarding (se aplicável)'));
      body.appendChild(el('input',{type:'date', id:'cm-onb', value: card.data_onboarding ? card.data_onboarding.slice(0,10) : ''}));
    }

  const fbtn = $('#modal-confirm');
  fbtn.textContent = (tipo==='atrasos' || tipo==='marketplace') ? 'Publicar nos dois pipes' : (tipo==='vencidos' ? 'Concluir atualização' : 'Publicar');
  fbtn.onclick = ()=> publicarComentario(card);
}

function enviarPorGmail(analise, card){
  // Compose URL do Gmail web
  const to = ''; // TODO: integrar contato do cliente
  const su = encodeURIComponent(analise.email_assunto||'');
  const body = encodeURIComponent(analise.email_corpo||'');
  const url = `https://mail.google.com/mail/?view=cm&fs=1&to=${to}&su=${su}&body=${body}`;
  window.open(url, '_blank');
  // log no Pipefy
  comentarCard(card.id, `[NE] E-mail (Apêndice ${analise.apendice_usado}) gerado pelo agente e aberto para envio via Gmail.`).catch(()=>{});
  // log no Supabase
  if (supa){
    supa.from('auditoria_ne_analises').update({
      enviado_at: new Date().toISOString(),
      enviado_por: localStorage.getItem('branddi.analista')||'desconhecido'
    }).eq('card_id', card.id).then(()=>{}).catch(()=>{});
  }
}

async function publicarComentario(card){
  const texto = ($('#cm-text')?.value||'').trim();
  if (!texto && card.tipo !== 'vencidos'){
    toast('Comentário vazio', 'err'); return;
  }
  const due = $('#cm-due')?.value;
  const phaseInput = $('#cm-phase')?.value?.trim();

  if (card.tipo==='vencidos'){
    if (!due || !phaseInput){
      toast('Vencimento e fase são obrigatórios', 'err'); return;
    }
  }

  $('#modal-confirm').disabled = true;
  try {
    await comentarCard(card.id, texto || '[atualização]');
    if (due) await updateDueDate(card.id, new Date(due+'T12:00:00').toISOString());
    if (phaseInput) await moverFase(card.id, phaseInput);

    // Marketplace e Atrasos → também publica no outro pipe
    if (card.tipo==='atrasos' || card.tipo==='marketplace'){
      // TODO: localizar card "espelho" no outro pipe. Aqui assumimos mesmo ID — ajustar quando souber regra.
      try { await comentarCard(card.id, texto+' [duplicado no pipe '+(card.tipo==='marketplace'?'MARKETPLACES':'Atividades')+']'); } catch {}
    }

    toast('Publicado', 'ok');
    closeModal();
    // recarregar comentários e re-analisar se for NE
    if (deveAnalisarNE(card)) rodarAgenteNE(card);
  } catch(e){
    toast('Erro: '+e.message, 'err');
  } finally {
    $('#modal-confirm').disabled = false;
  }
}

async function enviarResumoGChat(){
  if (!CONFIG.gchatWebhook?.startsWith('http')){ toast('Webhook do Google Chat não configurado','err'); return; }
  const atrasos = state.cards.filter(c=>c.tipo==='atrasos');
  const concl = atrasos.filter(c=>isFinalizadoHoje(state.controles[c.id])).length;
  const pend = atrasos.length - concl;
  const text = `🧭 *Resumo de Auditoria — ${todayBRStr()}*\n• Atrasos: ${atrasos.length} (concluídos: ${concl} · pendentes: ${pend})\n• Vencidos na Fase: ${state.cards.filter(c=>c.tipo==='vencidos').length}\n• Desatualizados: ${state.cards.filter(c=>c.tipo==='desatualizados').length}\n• Marketplace: ${state.cards.filter(c=>c.tipo==='marketplace').length}`;
  try {
    await fetch(CONFIG.gchatWebhook,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    toast('Resumo enviado', 'ok');
  } catch(e){ toast('Erro: '+e.message, 'err'); }
}

  // Carrega só controles e análises NE
  if (supa){
    await Promise.all([ loadSupabaseControles(), loadSupabaseNEAnalises() ]);
    renderTable();
  }
  // First-run: se faltar Pipefy token, abre Configurar automaticamente
  if (!CONFIG.pipefyToken){
    banner('👋 <b>Bem-vinda(o)!</b> Cole seu token do Pipefy em <b>Configurar</b> pra começar.', 'warn');
    setTimeout(openConfigModal, 300);
  } else if (!supa){
    banner('⚙ Supabase não configurado. Clique em <b>Configurar</b>.', 'warn');
  }
})();
</script>
</body>
</html>
